<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StayNest</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<header class="navbar">
  <div class="logo">🛏 <span>StayNest</span></div>

  <nav>
    <a class="active">Home</a>
    <a href="destinations.html">Destinations</a>
    <a href="rooms.html">Rooms</a>
    <a href="about.html">About Us</a>
  </nav>

  <button class="btn-primary">Book Now</button>
</header>

<section class="hero">

  <div class="hero-left">
    <div class="tag">🏨 PREMIUM STAYS, MEMORABLE EXPERIENCES</div>

    <h1>
      Find Your Perfect Stay <br>
      Anywhere, <span>Anytime.</span>
    </h1>

    <p>
      Discover handpicked hotels with comfort, luxury,
      and unforgettable experiences. Book your stay
      with ease and confidence.
    </p>

    <div class="hero-buttons">
      <button class="btn-primary">Explore Hotels</button>
      <button class="btn-outline">▶ Watch Video</button>
    </div>

    <div class="stats">
      <div><h3>10K+</h3><span>Hotels</span></div>
      <div><h3>2M+</h3><span>Happy Guests</span></div>
      <div><h3>4.8</h3><span>Guest Rating</span></div>
    </div>
  </div>

  <div class="hero-right">
    <img src="https://img.freepik.com/premium-photo/hotel-room-with-bed-city-skyline-view-from-large-window_1022970-51368.jpg">
  </div>

</section>

<div class="search-container">
  <div class="search-box">

    <div class="field">
      <label>Destination</label>
      <input placeholder="Where are you going?">
    </div>

    <div class="field">
      <label>Check-in</label>
      <input type="date">
    </div>

    <div class="field">
      <label>Check-out</label>
      <input type="date">
    </div>

    <div class="field">
      <label>Guests</label>
      <select>
        <option>2 Guests</option>
      </select>
    </div>

    <button class="btn-primary">Search Hotels</button>

  </div>
</div>

</body>
</html>
