<!DOCTYPE html>

<body>

<header class="navbar">
  <div class="logo">🛏 <span>StayNest</span></div>

  <nav>

  </nav>

  <button class="btn-primary">Book Now</button>

<section class="destinations-section">

  <div class="dest-grid">

    <!-- CARD 1 -->

    </div>

    <div class="dest-card">

        <h3>Dubai, UAE</h3>
        <p>Luxury City</p>
        <span>$180 / night</span>
      </div>
    </div>

    <!-- CARD 4 -->
    <div class="dest-card">
      <img src="https://img.freepik.com/premium-photo/paris-eiffel-tower-skyline-aerial-france_79295-14918.jpg">

        <h3>Paris, France</h3>
        <p>City of Love</p>
        <span>$200 / night</span>
      </div>
    </div>

  </div>
